        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [searchTerm, setSearchTerm] = useState('');
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            
            const [students, setStudents] = useState(INITIAL_STUDENTS);
            const [attendanceData, setAttendanceData] = useState([]);
            const [assignmentData, setAssignmentData] = useState([]);
            const [schedule, setSchedule] = useState({ attendance: {}, assignments: {} });
            
            // State Firebase
            const [isInitialLoad, setIsInitialLoad] = useState(true);
            const [cloudStatus, setCloudStatus] = useState('loading'); 

            // State UI Modals
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);
            const [isInputModalOpen, setIsInputModalOpen] = useState(false);

            // State Form Data
            const [newStudent, setNewStudent] = useState({ nama: '', nim: '', kampus: 'UB' });
            const [editingData, setEditingData] = useState(null);
            const [draggedItemIndex, setDraggedItemIndex] = useState(null);

            // State Control Panel
            const [activePertemuan, setActivePertemuan] = useState(1);
            const [activeTugasDropdown, setActiveTugasDropdown] = useState(1);
            const [lectureMode, setLectureMode] = useState('offline');
            const [sessionDate, setSessionDate] = useState(new Date().toISOString().split('T')[0]);
            const [taskDate, setTaskDate] = useState(new Date().toISOString().split('T')[0]);
            const [manualAttendance, setManualAttendance] = useState({});
            const [manualAssignments, setManualAssignments] = useState({});
            const [uploadStatus, setUploadStatus] = useState(null);

            // STATE CUSTOM CONFIRM MODAL (Mencegah window.confirm terblokir)
            const [studentToDeleteData, setStudentToDeleteData] = useState(null);
            const [clearAllType, setClearAllType] = useState(null);

            // LOGO APLIKASI
            const LOGO_URL = "https://res.cloudinary.com/dfbkph06k/image/upload/v1773041131/ChatGPT_Image_Mar_9_2026_02_24_03_PM_nm9b7b.png";
            const BG_LIGHT = "https://res.cloudinary.com/dfbkph06k/image/upload/v1773040282/ChatGPT_Image_Mar_9_2026_02_09_09_PM_nec4ra.png";
            const BG_DARK = "https://res.cloudinary.com/dfbkph06k/image/upload/v1773040339/ChatGPT_Image_Mar_9_2026_02_11_41_PM_jjwdzg.png";

            useEffect(() => {
                lucide.createIcons();
            });

            // ==========================================
            // FIREBASE: Load Data Awal dari Firestore
            // ==========================================
            useEffect(() => {
                const loadData = async () => {
                    try {
                        const docRef = db.collection("keuangan_bisnis_db").doc("main_data");
                        const docSnap = await docRef.get();
                        
                        if (docSnap.exists) {
                            const data = docSnap.data();
                            if (data.students) {
                                let mergedStudents = data.students.map(dbStudent => {
                                    const initialRef = INITIAL_STUDENTS.find(i => i.nim === dbStudent.nim);
                                    return {
                                        ...dbStudent,
                                        kampus: dbStudent.kampus || (initialRef ? initialRef.kampus : 'UB')
                                    };
                                });

                                INITIAL_STUDENTS.forEach(initStudent => {
                                    if (!mergedStudents.some(s => s.nim === initStudent.nim)) {
                                        mergedStudents.push(initStudent);
                                    }
                                });
                                setStudents(mergedStudents);
                            } else {
                                setStudents(INITIAL_STUDENTS);
                            }
                            
                            if (data.attendanceData) setAttendanceData(data.attendanceData);
                            if (data.assignmentData) setAssignmentData(data.assignmentData);
                            if (data.schedule) setSchedule(data.schedule);
                        } else {
                            await docRef.set({
                                students: INITIAL_STUDENTS,
                                attendanceData: [],
                                assignmentData: [],
                                schedule: { attendance: {}, assignments: {} }
                            });
                        }
                        setCloudStatus('saved');
                    } catch(e) {
                        console.error("Gagal memuat data dari Firebase:", e);
                        setCloudStatus('error');
                    } finally {
                        setIsInitialLoad(false);
                    }
                };
                loadData();
            }, []);

            // ==========================================
            // FIREBASE: Auto-Save Data ke Firestore
            // ==========================================
            useEffect(() => {
                if (isInitialLoad) return;
                
                setCloudStatus('saving');
                const timer = setTimeout(async () => {
                    try {
                        await db.collection("keuangan_bisnis_db").doc("main_data").set({
                            students, attendanceData, assignmentData, schedule
                        }, { merge: true });
                        setCloudStatus('saved');
                    } catch(e) {
                        console.error("Gagal menyimpan ke Firebase:", e);
                        setCloudStatus('error');
                    }
                }, 1500);

                return () => clearTimeout(timer);
            }, [students, attendanceData, assignmentData, schedule, isInitialLoad]);


            const filteredStudents = useMemo(() => {
                return students.filter(s => (s.nama || "").toLowerCase().includes(searchTerm.toLowerCase()) || (s.nim || "").includes(searchTerm));
            }, [searchTerm, students]);

            // --- DRAG & DROP ---
            const handleDragStart = (index) => setDraggedItemIndex(index);
            const handleDragOver = (e) => e.preventDefault();
            const handleDrop = (index) => {
                if (draggedItemIndex === null || draggedItemIndex === index) return;
                const newStudents = [...students];
                const draggedItem = newStudents[draggedItemIndex];
                newStudents.splice(draggedItemIndex, 1);
                newStudents.splice(index, 0, draggedItem);
                setStudents(newStudents);
                setDraggedItemIndex(null);
            };

            // --- FUNGSI TAMBAH / EDIT MAHASISWA ---
            const handleAddStudent = () => {
                if (newStudent.nama && newStudent.nim) {
                    setStudents([...students, newStudent]);
                    setNewStudent({ nama: '', nim: '', kampus: 'UB' });
                    setIsAddModalOpen(false);
                }
            };

            const shuffleStudents = () => setStudents([...students].sort(() => Math.random() - 0.5));

            const openEditModal = (student) => {
                setEditingData({ originalNim: student.nim, nama: student.nama, nim: student.nim, kampus: student.kampus || 'UB' });
                setIsEditModalOpen(true);
            };

            const handleSaveEdit = () => {
                setStudents(prev => prev.map(s => s.nim === editingData.originalNim ? { nama: editingData.nama, nim: editingData.nim, kampus: editingData.kampus } : s));
                setAttendanceData(prev => prev.map(a => a.nim === editingData.originalNim ? { ...a, nim: editingData.nim } : a));
                setAssignmentData(prev => prev.map(a => a.nim === editingData.originalNim ? { ...a, nim: editingData.nim } : a));
                setIsEditModalOpen(false);
            };

            // --- FUNGSI HAPUS DATA MENGGUNAKAN CUSTOM MODAL (TIDAK MENGGUNAKAN window.confirm) ---
            
            // 1. Eksekutor Hapus Data Satuan (Tanpa menghapus mahasiswa)
            const executeDeleteStudentData = () => {
                if (studentToDeleteData) {
                    setAttendanceData(prev => prev.filter(a => a.nim !== studentToDeleteData.nim));
                    setAssignmentData(prev => prev.filter(a => a.nim !== studentToDeleteData.nim));
                    setStudentToDeleteData(null); // Tutup modal
                }
            };

            // 2. Eksekutor Hapus Data Massal
            const executeClearAllData = () => {
                if (clearAllType === 'absensi') {
                    setAttendanceData([]);
                } else if (clearAllType === 'tugas') {
                    setAssignmentData([]);
                }
                setClearAllType(null); // Tutup modal
            };

            // --- FUNGSI UPDATE DATA ---
            const updateAttendance = (nim, id, type, status) => {
                setAttendanceData(prev => {
                    const other = prev.filter(a => !(a.nim === nim && a.id === id && a.type === type));
                    return status ? [...other, { nim, id, type, status }] : other;
                });
            };

            const updateAssignment = (nim, id, type, status) => {
                setAssignmentData(prev => {
                    const other = prev.filter(a => !(a.nim === nim && a.id === id && a.type === type));
                    return status === 'Selesai' ? [...other, { nim, id, type, status: 'Selesai' }] : other;
                });
            };

            const saveManualAttendance = () => {
                const type = (activePertemuan === 99) ? 'uts' : (activePertemuan === 100) ? 'uas' : 'pertemuan';
                const newRecords = Object.entries(manualAttendance).map(([nim, status]) => ({ nim, id: activePertemuan, type, status }));
                setAttendanceData(prev => [...prev.filter(a => !(a.type === type && a.id === activePertemuan)), ...newRecords]);
                const keyType = (activePertemuan === 99) ? 'uts' : (activePertemuan === 100) ? 'uas' : `pertemuan-${activePertemuan}`;
                setSchedule(prev => ({ ...prev, attendance: { ...prev.attendance, [keyType]: { date: sessionDate, mode: lectureMode } } }));
                setIsInputModalOpen(false);
            };

            const saveManualAssignments = () => {
                const type = (activeTugasDropdown === 99) ? 'uts' : (activeTugasDropdown === 100) ? 'uas' : 'tugas';
                const newRecords = Object.entries(manualAssignments).filter(([_, status]) => status === 'Selesai').map(([nim, status]) => ({ nim, id: activeTugasDropdown, type, status }));
                setAssignmentData(prev => [...prev.filter(a => !(a.type === type && a.id === activeTugasDropdown)), ...newRecords]);
                const keyType = (activeTugasDropdown === 99) ? 'uts' : (activeTugasDropdown === 100) ? 'uas' : `tugas-${activeTugasDropdown}`;
                setSchedule(prev => ({ ...prev, assignments: { ...prev.assignments, [keyType]: { date: taskDate } } }));
                setIsTaskInputModalOpen(false);
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setUploadStatus({ type: 'loading', text: 'Sedang memproses file...' });

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, { type: 'binary' });
                        const wsname = wb.SheetNames[0];
                        const ws = wb.Sheets[wsname];
                        const data = XLSX.utils.sheet_to_json(ws);

                        // Cari kolom yang mengandung kata "NIM"
                        let nimColumn = null;
                        if (data.length > 0) {
                            const keys = Object.keys(data[0]);
                            nimColumn = keys.find(k => k.toLowerCase().includes('nim'));
                        }

                        if (!nimColumn) {
                            setUploadStatus({ type: 'error', text: "Gagal: Kolom 'NIM' tidak ditemukan di file CSV/Excel." });
                            return;
                        }

                        const newAttendance = [...attendanceData];
                        let syncedCount = 0;

                        data.forEach(row => {
                            const rawNim = String(row[nimColumn]).trim();
                            const isStudentExist = students.some(s => s.nim === rawNim);

                            if (isStudentExist) {
                                const type = (activePertemuan === 99) ? 'uts' : (activePertemuan === 100) ? 'uas' : 'pertemuan';
                                const existingIndex = newAttendance.findIndex(a => a.nim === rawNim && a.id === activePertemuan && a.type === type);

                                if (existingIndex >= 0) {
                                    newAttendance[existingIndex].status = 'Hadir';
                                } else {
                                    newAttendance.push({ nim: rawNim, id: activePertemuan, type, status: 'Hadir' });
                                }
                                syncedCount++;
                            }
                        });

                        setAttendanceData(newAttendance);
                        const keyType = (activePertemuan === 99) ? 'uts' : (activePertemuan === 100) ? 'uas' : `pertemuan-${activePertemuan}`;
                        setSchedule(prev => ({ ...prev, attendance: { ...prev.attendance, [keyType]: { date: sessionDate, mode: 'online' } } }));

                        setUploadStatus({ type: 'success', text: `Berhasil! ${syncedCount} respons cocok & ditandai Hadir.` });
                        
                        setTimeout(() => {
                            setUploadStatus(null);
                            setIsInputModalOpen(false);
                        }, 2500);

                    } catch (err) {
                        setUploadStatus({ type: 'error', text: 'Terjadi kesalahan saat membaca file. Pastikan format file sesuai.' });
                    }
                };
                reader.readAsBinaryString(file);
            };

            const handleExport = async () => {
                if (activeTab === 'tugas') {
                    let exportData = students.map((student, index) => {
                        const row = { "No": index + 1, "Nama Mahasiswa": student.nama, "NIM": student.nim, "Kampus": student.kampus || "-" };
                        for (let i = 1; i <= 6; i++) {
                            const sched = schedule.assignments[`tugas-${i}`];
                            const record = assignmentData.find(a => a.nim === student.nim && a.id === i && a.type === 'tugas');
                            row[`Tugas ${i} Status`] = record ? "Selesai" : "-";
                            row[`Tugas ${i} Tanggal`] = sched?.date ? sched.date : "-";
                        }
                        const uts = assignmentData.find(a => a.nim === student.nim && a.type === 'uts');
                        row[`Proyek UTS Status`] = uts ? "Selesai" : "-";
                        const uas = assignmentData.find(a => a.nim === student.nim && a.type === 'uas');
                        row[`Proyek UAS Status`] = uas ? "Selesai" : "-";
                        return row;
                    });
                    const ws = XLSX.utils.json_to_sheet(exportData);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, "Rekap Tugas");
                    XLSX.writeFile(wb, `Rekap_Tugas_Keuangan_Bisnis.xlsx`);
                    return;
                }

                // ==========================================
                // EXPORT ABSENSI DENGAN FORMAT TEMPLATE KAMPUS (MERGE CELLS)
                // ==========================================
                const tglPertemuan = [];
                const modePertemuan = []; 
                for (let i = 1; i <= 14; i++) {
                    const sched = schedule.attendance[`pertemuan-${i}`];
                    tglPertemuan.push(sched?.date ? sched.date : `P${i}`);
                    modePertemuan.push(sched?.mode ? (sched.mode === 'online' ? 'On' : 'Off') : '');
                }

                const utsSched = schedule.attendance['uts'];
                tglPertemuan.push(utsSched?.date ? utsSched.date : 'UTS');
                modePertemuan.push(utsSched?.mode === 'online' ? 'On' : (utsSched?.mode === 'offline' ? 'Off' : ''));

                const uasSched = schedule.attendance['uas'];
                tglPertemuan.push(uasSched?.date ? uasSched.date : 'UAS');
                modePertemuan.push(uasSched?.mode === 'online' ? 'On' : (uasSched?.mode === 'offline' ? 'Off' : ''));

                                                                                <div className="flex justify-center">
                                                                                    <select 
                                                                                        className={`text-[9px] font-black p-1 md:p-2 rounded-xl border-none text-center cursor-pointer appearance-none w-full ${!rec?.status ? (isDarkMode ? 'bg-slate-800 text-slate-400 opacity-50' : 'bg-slate-100 text-slate-400 opacity-50') : rec.status === 'Hadir' ? 'bg-emerald-500 text-white' : rec.status === 'Izin' ? 'bg-amber-500 text-white' : 'bg-rose-500 text-white'}`}
                                                                                        value={rec?.status || ""}
                                                                                        onChange={(e) => updateAttendance(student.nim, i+1, 'pertemuan', e.target.value)}
                                                                                    >
                                                                                        <option value="">−</option>
                                                                                        <option value="Hadir">H</option><option value="Izin">I</option><option value="Alpa">A</option>
                                                                                    </select>
                                                                                </div>
                                                                            </td>
                                                                        );
                                                                    })}
                                                                    
                                                                    {/* KOLOM UTS ABSENSI YANG ADAPTIF WARNA FONTNYA */}
                                                                    <td className={`px-1 md:px-3 py-3 md:py-5 border-l ${isDarkMode ? 'bg-blue-500/10 border-slate-700' : 'bg-blue-50/50 border-slate-100/30'}`}>
                                                                        <div className="flex justify-center">
                                                                            <select 
                                                                                className={`text-[9px] font-black p-1 md:p-2 rounded-xl w-full text-center border-none cursor-pointer appearance-none ${!attendanceData.find(a => a.nim === student.nim && a.type === 'uts')?.status ? (isDarkMode ? 'bg-slate-800 text-slate-300' : 'bg-white text-slate-400') : attendanceData.find(a => a.nim === student.nim && a.type === 'uts')?.status === 'Hadir' ? 'bg-emerald-500 text-white' : attendanceData.find(a => a.nim === student.nim && a.type === 'uts')?.status === 'Izin' ? 'bg-amber-500 text-white' : 'bg-rose-500 text-white'}`} 
                                                                                value={attendanceData.find(a => a.nim === student.nim && a.type === 'uts')?.status || ""} 
                                                                                onChange={(e) => updateAttendance(student.nim, 99, 'uts', e.target.value)}
                                                                            >
                                                                                <option value="">−</option><option value="Hadir">H</option><option value="Izin">I</option><option value="Alpa">A</option>
                                                                            </select>
                                                                        </div>
                                                                    </td>
                                                                    
                                                                    {/* KOLOM UAS ABSENSI YANG ADAPTIF WARNA FONTNYA */}
                                                                    <td className={`px-1 md:px-3 py-3 md:py-5 border-l ${isDarkMode ? 'bg-blue-500/10 border-slate-700' : 'bg-blue-50/50 border-slate-100/30'}`}>
                                                                        <div className="flex justify-center">
                                                                            <select 
                                                                                className={`text-[9px] font-black p-1 md:p-2 rounded-xl w-full text-center border-none cursor-pointer appearance-none ${!attendanceData.find(a => a.nim === student.nim && a.type === 'uas')?.status ? (isDarkMode ? 'bg-slate-800 text-slate-300' : 'bg-white text-slate-400') : attendanceData.find(a => a.nim === student.nim && a.type === 'uas')?.status === 'Hadir' ? 'bg-emerald-500 text-white' : attendanceData.find(a => a.nim === student.nim && a.type === 'uas')?.status === 'Izin' ? 'bg-amber-500 text-white' : 'bg-rose-500 text-white'}`} 
                                                                                value={attendanceData.find(a => a.nim === student.nim && a.type === 'uas')?.status || ""} 
                                                                                onChange={(e) => updateAttendance(student.nim, 100, 'uas', e.target.value)}
                                                                            >
                                                                                <option value="">−</option><option value="Hadir">H</option><option value="Izin">I</option><option value="Alpa">A</option>
                                                                            </select>
                                                                        </div>
                                                                    </td>
                                                                </>
                                                            ) : (
                                                                <>
                                                                    {[...Array(6)].map((_, i) => {
                                                                        const rec = assignmentData.find(a => a.nim === student.nim && a.id === i+1 && a.type === 'tugas');
                                                                        return (
                                                                            <td key={i} className={`px-1 md:px-3 py-3 md:py-5 border-l text-center ${isDarkMode ? 'border-slate-700' : 'border-slate-100/30'}`}>
                                                                                <select className={`text-[8px] font-black w-full p-1 md:p-2 rounded-xl border-none text-center cursor-pointer appearance-none ${rec ? 'bg-indigo-600 text-white' : (isDarkMode ? 'bg-slate-800 text-slate-400 opacity-50' : 'bg-slate-100 text-slate-400 opacity-50')}`} value={rec ? "Selesai" : ""} onChange={(e) => updateAssignment(student.nim, i+1, 'tugas', e.target.value)}><option value="">−</option><option value="Selesai">SELESAI</option></select>
                                                                            </td>
                                                                        );
                                                                    })}
                                                                    
                                                                    {/* KOLOM UTS TUGAS YANG ADAPTIF */}
                                                                    <td className={`px-1 md:px-3 py-3 md:py-5 border-l text-center ${isDarkMode ? 'bg-indigo-500/10 border-slate-700' : 'bg-indigo-50/50 border-slate-100/30'}`}>
                                                                        <select className={`text-[8px] font-black w-full p-1 md:p-2 rounded-xl border-none text-center cursor-pointer appearance-none ${assignmentData.some(a => a.nim === student.nim && a.type === 'uts') ? 'bg-indigo-800 text-white' : (isDarkMode ? 'bg-slate-800 text-slate-300' : 'bg-white text-slate-400')}`} value={assignmentData.some(a => a.nim === student.nim && a.type === 'uts') ? "Selesai" : ""} onChange={(e) => updateAssignment(student.nim, 99, 'uts', e.target.value)}><option value="">−</option><option value="Selesai">SELESAI</option></select>
                                                                    </td>
                                                                    
                                                                    {/* KOLOM UAS TUGAS YANG ADAPTIF */}
                                                                    <td className={`px-1 md:px-3 py-3 md:py-5 border-l text-center ${isDarkMode ? 'bg-indigo-500/10 border-slate-700' : 'bg-indigo-50/50 border-slate-100/30'}`}>
                                                                        <select className={`text-[8px] font-black w-full p-1 md:p-2 rounded-xl border-none text-center cursor-pointer appearance-none ${assignmentData.some(a => a.nim === student.nim && a.type === 'uas') ? 'bg-indigo-800 text-white' : (isDarkMode ? 'bg-slate-800 text-slate-300' : 'bg-white text-slate-400')}`} value={assignmentData.some(a => a.nim === student.nim && a.type === 'uas') ? "Selesai" : ""} onChange={(e) => updateAssignment(student.nim, 100, 'uas', e.target.value)}><option value="">−</option><option value="Selesai">SELESAI</option></select>
                                                                    </td>
                                                                </>
                                                            )}
                                                            <td className="px-4 md:px-8 py-3 md:py-5 text-center border-l bg-slate-50/20">
                                                                <div className="flex gap-1 md:gap-2 justify-center">
                                                                    <button onClick={() => openEditModal(student)} className={`p-1.5 md:p-2.5 rounded-xl transition-all border shadow-sm ${isDarkMode ? 'bg-slate-800 border-slate-700 hover:bg-blue-600 text-slate-400 hover:text-white' : 'bg-white border-slate-200 hover:bg-blue-600 text-slate-400 hover:text-white'}`}><Icons.Edit2 /></button>
                                                                    {/* TOMBOL HAPUS DATA SATUAN DENGAN CUSTOM MODAL */}
                                                                    <button onClick={() => setStudentToDeleteData({ nim: student.nim, nama: student.nama })} className={`p-1.5 md:p-2.5 rounded-xl transition-all border shadow-sm ${isDarkMode ? 'bg-slate-800 border-rose-900/50 hover:bg-rose-600 text-rose-500 hover:text-white' : 'bg-white border-rose-50 hover:bg-rose-500 text-rose-400 hover:text-white'}`}><Icons.Trash2 /></button>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MODALS */}
                    {isAddModalOpen && <Modal isDark={isDarkMode} title="Daftar Mahasiswa Baru" onClose={() => setIsAddModalOpen(false)} icon={<Icons.UserPlus />}>
                        <div className="space-y-4 p-8">
                            <input type="text" placeholder="Nama" className={`w-full px-6 py-4 rounded-2xl border font-bold ${isDarkMode ? 'bg-slate-800 border-slate-700 text-white placeholder-slate-500' : 'bg-slate-50 border-slate-200'}`} value={newStudent.nama} onChange={e => setNewStudent({...newStudent, nama: e.target.value})} />
                            <input type="text" placeholder="NIM" className={`w-full px-6 py-4 rounded-2xl border font-bold ${isDarkMode ? 'bg-slate-800 border-slate-700 text-white placeholder-slate-500' : 'bg-slate-50 border-slate-200'}`} value={newStudent.nim} onChange={e => setNewStudent({...newStudent, nim: e.target.value})} />
                            <select className={`w-full px-6 py-4 rounded-2xl border font-bold ${isDarkMode ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50 border-slate-200'}`} value={newStudent.kampus} onChange={e => setNewStudent({...newStudent, kampus: e.target.value})}>
                                <option value="UB">UB (Biru)</option>
                                <option value="Bagasasi">Bagasasi (Merah)</option>
                            </select>
                            <button onClick={handleAddStudent} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase shadow-xl">Daftarkan Mahasiswa</button>
                        </div>
                    </Modal>}

                    {isEditModalOpen && <Modal isDark={isDarkMode} title="Edit Profil" onClose={() => setIsEditModalOpen(false)} icon={<Icons.Edit2 />}>
                        <div className="space-y-4 p-8">
                            <input type="text" className={`w-full px-6 py-4 rounded-2xl border font-bold ${isDarkMode ? 'bg-slate-800 border-slate-700 text-white' : 'bg-white border-slate-200'}`} value={editingData.nama} onChange={e => setEditingData({...editingData, nama: e.target.value})} />
                            <input type="text" className={`w-full px-6 py-4 rounded-2xl border font-bold ${isDarkMode ? 'bg-slate-800 border-slate-700 text-white' : 'bg-white border-slate-200'}`} value={editingData.nim} onChange={e => setEditingData({...editingData, nim: e.target.value})} />
                            <select className={`w-full px-6 py-4 rounded-2xl border font-bold ${isDarkMode ? 'bg-slate-800 border-slate-700 text-white' : 'bg-white border-slate-200'}`} value={editingData.kampus} onChange={e => setEditingData({...editingData, kampus: e.target.value})}>
                                <option value="UB">UB (Biru)</option>
                                <option value="Bagasasi">Bagasasi (Merah)</option>
                            </select>
                            <button onClick={handleSaveEdit} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase shadow-xl">Simpan Perubahan</button>
                        </div>
                    </Modal>}

                    {/* CONFIRMATION MODAL KOSONGKAN TABEL (Semua Data) */}
                    {clearAllType && (
                        <Modal isDark={isDarkMode} title="Kosongkan Tabel" onClose={() => setClearAllType(null)} icon={<Icons.AlertTriangle className="text-rose-500" />}>
                            <div className="p-8 space-y-6">
                                <p className={`text-sm font-bold text-center ${isDarkMode ? 'text-slate-300' : 'text-slate-600'}`}>
                                    Apakah Anda yakin ingin menghapus <span className="text-rose-500 uppercase">semua riwayat {clearAllType}</span> dari seluruh mahasiswa?<br/><br/>
                                    <span className="text-[10px] opacity-60">*Daftar mahasiswa akan tetap aman dan tidak terhapus.</span>
                                </p>
                                <div className="flex gap-4">
                                    <button onClick={() => setClearAllType(null)} className={`flex-1 py-4 rounded-2xl font-black uppercase text-xs ${isDarkMode ? 'bg-slate-800 text-white hover:bg-slate-700' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>Batal</button>
                                    <button onClick={executeClearAllData} className="flex-1 py-4 bg-rose-600 text-white rounded-2xl font-black uppercase text-xs hover:bg-rose-700 shadow-lg shadow-rose-500/30">Ya, Kosongkan</button>
                                </div>
                            </div>
                        </Modal>
                    )}

                    {/* CONFIRMATION MODAL HAPUS DATA SATUAN */}
                    {studentToDeleteData && (
                        <Modal isDark={isDarkMode} title="Hapus Data" onClose={() => setStudentToDeleteData(null)} icon={<Icons.AlertTriangle className="text-rose-500" />}>
                            <div className="p-8 space-y-6">
                                <p className={`text-sm font-bold text-center ${isDarkMode ? 'text-slate-300' : 'text-slate-600'}`}>
                                    Apakah Anda yakin ingin mereset/menghapus <span className="text-rose-500 uppercase">seluruh riwayat absensi dan tugas</span> milik:<br/><br/>
                                    <span className="text-lg font-black text-blue-500 uppercase">{studentToDeleteData.nama}</span>?<br/><br/>
                                    <span className="text-[10px] opacity-60">*Nama mahasiswa ini TIDAK akan dihapus dari tabel.</span>
                                </p>
                                <div className="flex gap-4">
                                    <button onClick={() => setStudentToDeleteData(null)} className={`flex-1 py-4 rounded-2xl font-black uppercase text-xs ${isDarkMode ? 'bg-slate-800 text-white hover:bg-slate-700' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>Batal</button>
                                    <button onClick={executeDeleteStudentData} className="flex-1 py-4 bg-rose-600 text-white rounded-2xl font-black uppercase text-xs hover:bg-rose-700 shadow-lg shadow-rose-500/30">Ya, Reset Data</button>
                                </div>
                            </div>
                        </Modal>
                    )}

                    {isInputModalOpen && <Modal isDark={isDarkMode} title={`Rekap P${activePertemuan}`} onClose={() => setIsInputModalOpen(false)} icon={<Icons.UserCheck />}>
                        <div className="p-8 space-y-6">
                            {lectureMode === 'online' ? (
                                <div className="text-center space-y-4">
                                    <div className={`p-5 rounded-3xl font-mono text-xs break-all ${isDarkMode ? 'bg-blue-900/40 text-blue-400' : 'bg-blue-50 text-blue-600'}`}>{SESSION_LINKS[activePertemuan]}</div>
                                    <div className="flex flex-col gap-3 text-left">
                                        <a href={SESSION_LINKS[activePertemuan]} target="_blank" className="py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs text-center shadow-lg">1. Buka & Bagikan Form</a>
                                        <div className={`text-[10px] font-bold px-2 mt-2 text-center opacity-60 ${isDarkMode ? 'text-white' : 'text-slate-800'}`}>2. Download respons Form sebagai .CSV, lalu upload di bawah:</div>
                                        
                                        {uploadStatus && (
                                            <div className={`p-4 rounded-xl text-xs font-black text-center border ${uploadStatus.type === 'error' ? 'bg-rose-100 text-rose-600 border-rose-200' : uploadStatus.type === 'success' ? 'bg-emerald-100 text-emerald-600 border-emerald-200' : 'bg-blue-100 text-blue-600 border-blue-200 animate-pulse'}`}>
                                                {uploadStatus.text}
                                            </div>
                                        )}

                                        <label className={`py-4 border-2 border-emerald-500 text-emerald-500 rounded-2xl font-black uppercase text-xs cursor-pointer hover:bg-emerald-500 hover:text-white transition-all text-center ${isDarkMode ? 'hover:bg-emerald-600 hover:border-emerald-600' : ''}`}>
                                            Upload Excel/CSV & Sinkron NIM
                                            <input type="file" className="hidden" accept=".xlsx, .xls, .csv" onChange={handleFileUpload} />
                                        </label>
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    <button onClick={() => { let m={}; students.forEach(s=>m[s.nim]='Hadir'); setManualAttendance(m); }} className="w-full py-2 bg-emerald-600 text-white rounded-xl text-[10px] font-black uppercase">Set Semua Hadir</button>
                                    <div className="max-h-64 overflow-y-auto custom-scrollbar space-y-2 pr-2">
                                        {students.map(s => (
                                            <div key={s.nim} className={`flex justify-between items-center p-3 border rounded-xl shadow-sm ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'}`}>
                                                <span className="text-[10px] font-black uppercase truncate max-w-[140px]">{s.nama}</span>
                                                <div className="flex gap-1">{['Hadir', 'Izin', 'Alpa'].map(st => (
                                                    <button key={st} onClick={() => setManualAttendance({...manualAttendance, [s.nim]: st})} className={`w-8 h-8 rounded-lg text-[9px] font-black border ${manualAttendance[s.nim] === st ? 'bg-blue-600 text-white border-blue-600' : isDarkMode ? 'bg-slate-700 border-slate-600 text-slate-300' : 'bg-slate-50 border-slate-200'}`}>{st[0]}</button>
                                                ))}</div>
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={saveManualAttendance} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs">Simpan Data</button>
                                </div>
                            )}
                        </div>
                    </Modal>}

                    {isTaskInputModalOpen && <Modal isDark={isDarkMode} title="Input Tugas Masal" onClose={() => setIsTaskInputModalOpen(false)} icon={<Icons.ClipboardCheck />}>
                        <div className="p-8 space-y-4">
                            <button onClick={() => { const all = {}; students.forEach(s => all[s.nim] = 'Selesai'); setManualAssignments(all); }} className="w-full py-3 bg-indigo-600 text-white rounded-xl text-[10px] font-black uppercase">Tandai Semua Selesai</button>
                            <div className="max-h-64 overflow-y-auto custom-scrollbar space-y-2 pr-2">
                                {students.map(s => (
                                    <div key={s.nim} className={`flex justify-between items-center p-3 border rounded-xl shadow-sm ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'}`}>
                                        <span className="text-[10px] font-black uppercase truncate max-w-[140px]">{s.nama}</span>
                                        <button onClick={() => setManualAssignments({...manualAssignments, [s.nim]: manualAssignments[s.nim] === 'Selesai' ? '' : 'Selesai'})} className={`px-4 py-2 rounded-xl text-[9px] font-black border ${manualAssignments[s.nim] === 'Selesai' ? 'bg-indigo-600 text-white border-indigo-600' : isDarkMode ? 'bg-slate-700 border-slate-600 text-slate-300' : 'bg-slate-50 border-slate-200'}`}>{manualAssignments[s.nim] === 'Selesai' ? 'SELESAI' : 'BELUM'}</button>
                                    </div>
                                ))}
                            </div>
                            <button onClick={saveManualAssignments} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black uppercase text-xs">Simpan Data Tugas</button>
                        </div>
                    </Modal>}

                    <footer className="py-12 text-center border-t text-[10px] uppercase font-black opacity-40">Keuangan Bisnis Dashboard v6.0 • Cloud Integration © 2026</footer>
                    </div>
                </div>
            );
        };

        const StatCard = ({ title, value, icon, isDark }) => (
            <div className={`p-6 rounded-[2rem] border shadow-lg transition-all ${isDark ? 'bg-slate-900/60 border-white/10 text-white' : 'bg-white/70 border-white/40 text-slate-800'}`}>
                <div className="flex justify-between items-start">
                    <div><p className="text-[10px] font-black uppercase opacity-40 mb-1">{title}</p><h4 className="text-xl font-black">{value}</h4></div>
                    <div className="p-3 bg-blue-500/20 text-blue-500 rounded-2xl">{icon}</div>
                </div>
            </div>
        );

        const QuickActionIcon = ({ icon, label, value }) => (
            <div className="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/5">
                <div className="w-10 h-10 rounded-xl bg-blue-500/20 flex items-center justify-center text-blue-400">{icon}</div>
                <div><p className="text-[10px] font-bold opacity-40 uppercase">{label}</p><p className="text-xs font-black uppercase">{value}</p></div>
            </div>
        );

        const Modal = ({ title, icon, children, onClose, isDark }) => (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md">
                <div className={`w-full max-w-md ${isDark ? 'bg-slate-900 border-slate-700 text-white' : 'bg-white border-white'} rounded-[2.5rem] overflow-hidden shadow-2xl border flex flex-col max-h-[90vh]`}>
                    <div className={`p-8 border-b ${isDark ? 'border-slate-800' : 'border-slate-100'} flex items-center justify-between shrink-0`}>
                        <div className="flex items-center gap-3 text-blue-600">{icon}<h3 className="font-black text-xl uppercase tracking-tighter">{title}</h3></div>
                        <button onClick={onClose} className="p-2 rounded-full hover:bg-rose-500 hover:text-white transition-all"><Icons.X /></button>
                    </div>
                    {children}
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
