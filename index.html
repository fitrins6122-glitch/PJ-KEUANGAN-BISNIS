    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Icons & XLSX -->

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
        
        /* Dropdown reset for cleaner UI */
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        /* Drag effect */
        tr.dragging {
            opacity: 0.5;
            background-color: #3b82f620;
        }
    </style>
</head>
<body>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // PERBAIKAN: Membungkus icon dengan <span> menggunakan dangerouslySetInnerHTML
        // agar React tidak bentrok dengan manipulasi DOM dari Vanilla JS (Lucide)
        const createIcon = (name) => ({ className = '', ...props }) => (
            <span className={`inline-flex items-center justify-center ${className}`} {...props} dangerouslySetInnerHTML={{ __html: `<i data-lucide="${name}"></i>` }} />
        );

        const Icons = {

            CheckCircle: createIcon('check-circle'),
            FileText: createIcon('file-text'),
            Calendar: createIcon('calendar'),

            Moon: createIcon('moon'),
            Download: createIcon('download'),
            Edit2: createIcon('edit-2'),
            X: createIcon('x'),
            Save: createIcon('save'),

            ExternalLink: createIcon('external-link'),
            GripVertical: createIcon('grip-vertical'),

        const SESSION_LINKS = {

        };

        const INITIAL_STUDENTS = [
            { nim: "20924587", nama: "Tria Rahmah Zahra" },
            { nim: "20924588", nama: "Trias Rachmi Kinanti Hapidin" },
            { nim: "20924589", nama: "Ulfi Nur Awaliah" },

            { nim: "20924591", nama: "Wildan Sami Kalamullah" },
            { nim: "20924592", nama: "Wulandari Nur Fitri" },

            { nim: "20924595", nama: "Yolla Puspita" },
            { nim: "20924597", nama: "Zahra Nursaidah Mardatillah" },
            { nim: "20924598", nama: "Zaky Muhammad" },
            { nim: "20924599", nama: "Zalfaa Nursyifa Damaliyana" },

            { nim: "20924832", nama: "Adi Herlambang" },
            { nim: "20924833", nama: "Ai Wiwin Marlina" },
            { nim: "20924834", nama: "Aina Salsabila" },
            { nim: "20924835", nama: "Alfa Rizki Patiha" },
            { nim: "20924836", nama: "Alifa Salamet Pajar" },
            { nim: "20924837", nama: "Alya Anjani Mutiara Hati" },
            { nim: "20924838", nama: "Amelia Kartika" },
            { nim: "20924839", nama: "Andini Lisdayani" },
            { nim: "20924840", nama: "Anisa Fitri Khaeriah" },
            { nim: "20924841", nama: "Annisa Nurhaliza" },
            { nim: "20924842", nama: "Aprian Maulana" },
            { nim: "20924843", nama: "Aprilia Keysya Ananda Putri" },
            { nim: "20924844", nama: "Arista Dinda Kusumawati" },
            { nim: "20924845", nama: "Astia Amalia" },
            { nim: "20924846", nama: "Deni Suryana" },
            { nim: "20924847", nama: "Desti Dahab Mar Ati" },
            { nim: "20924848", nama: "Devina Yunita Susanti" },
            { nim: "20924849", nama: "Dian Nurul Aini" },
            { nim: "20924850", nama: "Diana Ghifari Ruhendi" },
            { nim: "20924851", nama: "Dimas Layadri Saputra" },
            { nim: "20924852", nama: "Dina Amelia" },
            { nim: "20924853", nama: "Fahiranisa Shalitsa Husada" },
            { nim: "20924854", nama: "Fahri Fauzan" },
            { nim: "20924855", nama: "Faldi Fahrizal" },
            { nim: "20924856", nama: "Farhan Fitrahudin" },
            { nim: "20924857", nama: "Fira Selomita" },
            { nim: "20924858", nama: "Fitri Nuraeni Solihah" },
            { nim: "20924860", nama: "Hadist Guida Herdiana" },
        ];

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [searchTerm, setSearchTerm] = useState('');
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [students, setStudents] = useState(INITIAL_STUDENTS);
            const [attendanceData, setAttendanceData] = useState([]);
            const [assignmentData, setAssignmentData] = useState([]);
            const [schedule, setSchedule] = useState({ attendance: {}, assignments: {} });
            
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);
            const [isInputModalOpen, setIsInputModalOpen] = useState(false);
            const [isTaskInputModalOpen, setIsTaskInputModalOpen] = useState(false);
            const [newStudent, setNewStudent] = useState({ nama: '', nim: '' });
            const [editingData, setEditingData] = useState(null);
            const [draggedItemIndex, setDraggedItemIndex] = useState(null);

            const [activePertemuan, setActivePertemuan] = useState(1);
            const [activeTugasDropdown, setActiveTugasDropdown] = useState(1);
            const [lectureMode, setLectureMode] = useState('offline');
            const [sessionDate, setSessionDate] = useState(new Date().toISOString().split('T')[0]);
            const [taskDate, setTaskDate] = useState(new Date().toISOString().split('T')[0]);
            const [manualAttendance, setManualAttendance] = useState({});
            const [manualAssignments, setManualAssignments] = useState({});
            const [uploadStatus, setUploadStatus] = useState(null);

            const LOGO_URL = "https://res.cloudinary.com/dfbkph06k/image/upload/v1773041131/ChatGPT_Image_Mar_9_2026_02_24_03_PM_nm9b7b.png";
            const BG_LIGHT = "https://res.cloudinary.com/dfbkph06k/image/upload/v1773040282/ChatGPT_Image_Mar_9_2026_02_09_09_PM_nec4ra.png";
            const BG_DARK = "https://res.cloudinary.com/dfbkph06k/image/upload/v1773040339/ChatGPT_Image_Mar_9_2026_02_11_41_PM_jjwdzg.png";

            // PERBAIKAN: Jalankan lucide tanpa array dependensi agar selalu melakukan 
            // pemindaian (scan) setiap kali ada perubahan status/render komponen
            useEffect(() => {
                lucide.createIcons();
            });

            const filteredStudents = useMemo(() => {
                return students.filter(s => (s.nama || "").toLowerCase().includes(searchTerm.toLowerCase()) || (s.nim || "").includes(searchTerm));
            }, [searchTerm, students]);

            // --- DRAG & DROP ---
            const handleDragStart = (index) => setDraggedItemIndex(index);
            const handleDragOver = (e) => e.preventDefault();
            const handleDrop = (index) => {
                if (draggedItemIndex === null || draggedItemIndex === index) return;
                const newStudents = [...students];
                const draggedItem = newStudents[draggedItemIndex];
                newStudents.splice(draggedItemIndex, 1);
                newStudents.splice(index, 0, draggedItem);
                setStudents(newStudents);
                setDraggedItemIndex(null);
            };

            // --- LOGIKA ---
            const handleAddStudent = () => {
                if (newStudent.nama && newStudent.nim) {
                    setStudents([...students, newStudent]);
                    setNewStudent({ nama: '', nim: '' });
                    setIsAddModalOpen(false);
                }
            };

            const handleDeleteStudent = (nim) => {
                if (confirm("Hapus mahasiswa ini?")) {
                    setStudents(prev => prev.filter(s => s.nim !== nim));
                    setAttendanceData(prev => prev.filter(a => a.nim !== nim));
                    setAssignmentData(prev => prev.filter(a => a.nim !== nim));
                }
            };

            const shuffleStudents = () => setStudents([...students].sort(() => Math.random() - 0.5));

            const openEditModal = (student) => {
                setEditingData({ originalNim: student.nim, nama: student.nama, nim: student.nim });
                setIsEditModalOpen(true);
            };

            const handleSaveEdit = () => {
                setStudents(prev => prev.map(s => s.nim === editingData.originalNim ? { nama: editingData.nama, nim: editingData.nim } : s));
                setAttendanceData(prev => prev.map(a => a.nim === editingData.originalNim ? { ...a, nim: editingData.nim } : a));
                setAssignmentData(prev => prev.map(a => a.nim === editingData.originalNim ? { ...a, nim: editingData.nim } : a));
                setIsEditModalOpen(false);
            };

            const updateAttendance = (nim, id, type, status) => {
                setAttendanceData(prev => {
                    const other = prev.filter(a => !(a.nim === nim && a.id === id && a.type === type));
                    return status ? [...other, { nim, id, type, status }] : other;
                });
            };

            const updateAssignment = (nim, id, type, status) => {
                setAssignmentData(prev => {
                    const other = prev.filter(a => !(a.nim === nim && a.id === id && a.type === type));
                    return status === 'Selesai' ? [...other, { nim, id, type, status: 'Selesai' }] : other;
                });
            };

            const saveManualAttendance = () => {
                const type = (activePertemuan === 99) ? 'uts' : (activePertemuan === 100) ? 'uas' : 'pertemuan';
                const newRecords = Object.entries(manualAttendance).map(([nim, status]) => ({ nim, id: activePertemuan, type, status }));
                setAttendanceData(prev => [...prev.filter(a => !(a.type === type && a.id === activePertemuan)), ...newRecords]);
                const keyType = (activePertemuan === 99) ? 'uts' : (activePertemuan === 100) ? 'uas' : `pertemuan-${activePertemuan}`;
                setSchedule(prev => ({ ...prev, attendance: { ...prev.attendance, [keyType]: { date: sessionDate, mode: lectureMode } } }));
                setIsInputModalOpen(false);
            };

            const saveManualAssignments = () => {
                const type = (activeTugasDropdown === 99) ? 'uts' : (activeTugasDropdown === 100) ? 'uas' : 'tugas';
                const newRecords = Object.entries(manualAssignments).filter(([_, status]) => status === 'Selesai').map(([nim, status]) => ({ nim, id: activeTugasDropdown, type, status }));
                setAssignmentData(prev => [...prev.filter(a => !(a.type === type && a.id === activeTugasDropdown)), ...newRecords]);
                const keyType = (activeTugasDropdown === 99) ? 'uts' : (activeTugasDropdown === 100) ? 'uas' : `tugas-${activeTugasDropdown}`;
                setSchedule(prev => ({ ...prev, assignments: { ...prev.assignments, [keyType]: { date: taskDate } } }));
                setIsTaskInputModalOpen(false);
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setUploadStatus({ type: 'loading', text: 'Sedang memproses file...' });

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, { type: 'binary' });
                        const wsname = wb.SheetNames[0];
                        const ws = wb.Sheets[wsname];
                        const data = XLSX.utils.sheet_to_json(ws);

                        // Cari kolom yang mengandung kata "NIM"
                        let nimColumn = null;
                        if (data.length > 0) {
                            const keys = Object.keys(data[0]);
                            nimColumn = keys.find(k => k.toLowerCase().includes('nim'));
                        }

                        if (!nimColumn) {
                            setUploadStatus({ type: 'error', text: "Gagal: Kolom 'NIM' tidak ditemukan di file CSV/Excel." });
                            return;
                        }

                        const newAttendance = [...attendanceData];
                        let syncedCount = 0;

                        data.forEach(row => {
                            const rawNim = String(row[nimColumn]).trim();
                            const isStudentExist = students.some(s => s.nim === rawNim);

                            if (isStudentExist) {
                                const type = (activePertemuan === 99) ? 'uts' : (activePertemuan === 100) ? 'uas' : 'pertemuan';
                                const existingIndex = newAttendance.findIndex(a => a.nim === rawNim && a.id === activePertemuan && a.type === type);

                                if (existingIndex >= 0) {
                                    newAttendance[existingIndex].status = 'Hadir';
                                } else {
                                    newAttendance.push({ nim: rawNim, id: activePertemuan, type, status: 'Hadir' });
                                }
                                syncedCount++;
                            }
                        });

                        setAttendanceData(newAttendance);
                        const keyType = (activePertemuan === 99) ? 'uts' : (activePertemuan === 100) ? 'uas' : `pertemuan-${activePertemuan}`;
                        setSchedule(prev => ({ ...prev, attendance: { ...prev.attendance, [keyType]: { date: sessionDate, mode: 'online' } } }));

                        setUploadStatus({ type: 'success', text: `Berhasil! ${syncedCount} respons cocok & ditandai Hadir.` });
                        
                        // Menutup modal otomatis setelah sukses
                        setTimeout(() => {
                            setUploadStatus(null);
                            setIsInputModalOpen(false);
                        }, 2500);

                    } catch (err) {
                        setUploadStatus({ type: 'error', text: 'Terjadi kesalahan saat membaca file. Pastikan format file sesuai.' });
                    }
                };
                reader.readAsBinaryString(file);
            };

            const handleExport = async () => {
                let exportData = students.map(student => {
                    const row = { "Nama Mahasiswa": student.nama, "NIM": student.nim };
                    if (activeTab === 'absensi') {
                        for (let i = 1; i <= 14; i++) {
                            const sched = schedule.attendance[`pertemuan-${i}`];
                            const record = attendanceData.find(a => a.nim === student.nim && a.id === i && a.type === 'pertemuan');
                            row[`P${i}${sched?.date ? ` (${sched.date})` : ""}`] = record ? record.status : "-";
                        }
                    } else {
                        for (let i = 1; i <= 6; i++) {
                            const sched = schedule.assignments[`tugas-${i}`];
                            const record = assignmentData.find(a => a.nim === student.nim && a.id === i && a.type === 'tugas');
                            row[`Tugas ${i}${sched?.date ? ` (${sched.date})` : ""}`] = record ? "Selesai" : "-";
                        }
                    }
                    return row;
                });
                const ws = XLSX.utils.json_to_sheet(exportData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Data");
                XLSX.writeFile(wb, `Rekap_${activeTab}.xlsx`);
            };

            return (
                <div 
                    className={`min-h-screen transition-all duration-500 bg-fixed bg-cover bg-center ${isDarkMode ? 'dark text-white' : 'text-slate-900'}`}
                    style={{ backgroundImage: `url(${isDarkMode ? BG_DARK : BG_LIGHT})` }}
                >
                    <div className={isDarkMode ? 'bg-slate-900/40 min-h-screen' : ''}>
                    
                    {/* NAVBAR */}
                    <header className={`sticky top-0 z-40 border-b transition-all duration-300 ${isDarkMode ? 'bg-slate-900/80 border-white/10 backdrop-blur-md' : 'bg-white/80 border-slate-200 backdrop-blur-md'}`}>
                        <div className="max-w-7xl mx-auto px-4 h-24 flex items-center justify-between">
                            <div className="flex items-center space-x-6">
                                <img src={LOGO_URL} alt="Logo" className="w-20 h-20 object-contain bg-white p-1 rounded-2xl shadow-xl" />
                                <div>
                                    <h1 className="font-black text-2xl tracking-tight leading-none uppercase">Keuangan Bisnis</h1>
                                    <p className={`text-[10px] mt-1 uppercase tracking-[0.2em] font-black ${isDarkMode ? 'text-blue-400' : 'text-blue-600'}`}>Sistem Rekapitulasi Digital</p>
                                </div>
                            </div>
                            <nav className="hidden md:flex items-center space-x-2">
                                <button onClick={() => setActiveTab('dashboard')} className={`px-4 py-2 rounded-lg flex items-center gap-2 ${activeTab === 'dashboard' ? 'bg-blue-600 text-white' : 'text-slate-500 hover:bg-slate-100'}`}><Icons.BarChart3 /> Beranda</button>
                                <button onClick={() => setActiveTab('absensi')} className={`px-4 py-2 rounded-lg flex items-center gap-2 ${activeTab === 'absensi' ? 'bg-blue-600 text-white' : 'text-slate-500 hover:bg-slate-100'}`}><Icons.Calendar /> Absensi</button>
                                <button onClick={() => setActiveTab('tugas')} className={`px-4 py-2 rounded-lg flex items-center gap-2 ${activeTab === 'tugas' ? 'bg-blue-600 text-white' : 'text-slate-500 hover:bg-slate-100'}`}><Icons.FileText /> Tugas</button>
                                <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 rounded-full hover:bg-slate-100 transition-all text-slate-500">{isDarkMode ? <Icons.Sun /> : <Icons.Moon />}</button>
                            </nav>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                    <StatCard title="Mahasiswa" value={students.length} icon={<Icons.Users />} isDark={isDarkMode} />
                                    <StatCard title="Metode" value={lectureMode.toUpperCase()} icon={<Icons.UserCheck />} isDark={isDarkMode} />
                                    <StatCard title="Tugas" value={assignmentData.length} icon={<Icons.ClipboardCheck />} isDark={isDarkMode} />
                                    <StatCard title="Tanggal" value={sessionDate} icon={<Icons.CalendarDays />} isDark={isDarkMode} />
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-2 space-y-6">
                                        <div className={`p-8 rounded-[2rem] border shadow-2xl ${isDarkMode ? 'bg-slate-900/60 border-white/10' : 'bg-white/70 border-white/40'}`}>
                                            <div className="flex justify-between items-center mb-8">
                                                <h3 className="font-black text-lg flex items-center gap-3 uppercase text-blue-600"><Icons.Settings2 /> Kontrol Panel</h3>
                                                <div className="flex gap-2">
                                                    <button onClick={shuffleStudents} className="px-4 py-2 bg-amber-500 text-white rounded-xl text-[10px] font-black uppercase hover:bg-amber-600 transition-all shadow-lg"><Icons.Shuffle /> Acak Nama</button>
                                                    <button onClick={() => setIsAddModalOpen(true)} className="px-4 py-2 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase hover:bg-blue-700 transition-all shadow-lg"><Icons.UserPlus /> Tambah Data</button>
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 text-slate-800">
                                                <div className="space-y-4 p-6 bg-blue-50/50 rounded-3xl border border-blue-100">
                                                    <p className="text-[10px] font-black uppercase opacity-60">Sesi Kehadiran</p>
                                                    <select value={activePertemuan} onChange={(e) => setActivePertemuan(parseInt(e.target.value))} className="w-full p-3 rounded-xl border bg-white font-bold text-sm">
                                                        {[...Array(14)].map((_, i) => <option key={i} value={i+1}>Pertemuan {i+1}</option>)}
                                                        <option value="99">UTS</option>
                                                        <option value="100">UAS</option>
                                                    </select>
                                                    <input type="date" value={sessionDate} onChange={(e) => setSessionDate(e.target.value)} className="w-full p-3 rounded-xl border font-bold text-sm" />
                                                    <div className="flex gap-2">
                                                        <button onClick={() => { setLectureMode('online'); setIsInputModalOpen(true); setUploadStatus(null); }} className="flex-1 py-3 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase">Online</button>
                                                        <button onClick={() => { setLectureMode('offline'); setIsInputModalOpen(true); setUploadStatus(null); }} className="flex-1 py-3 bg-emerald-600 text-white rounded-xl text-[10px] font-black uppercase">Offline</button>
                                                    </div>
                                                </div>
                                                <div className="space-y-4 p-6 bg-indigo-50/50 rounded-3xl border border-indigo-100">
                                                    <p className="text-[10px] font-black uppercase opacity-60">Sesi Tugas</p>
                                                    <select value={activeTugasDropdown} onChange={(e) => setActiveTugasDropdown(parseInt(e.target.value))} className="w-full p-3 rounded-xl border bg-white font-bold text-sm">
                                                        {[...Array(6)].map((_, i) => <option key={i} value={i+1}>Tugas {i+1}</option>)}
                                                        <option value="99">Proyek UTS</option>
                                                        <option value="100">Proyek UAS</option>
                                                    </select>
                                                    <input type="date" value={taskDate} onChange={(e) => setTaskDate(e.target.value)} className="w-full p-3 rounded-xl border font-bold text-sm" />
                                                    <div className="flex gap-2">
                                                        <button onClick={() => { const key = activeTugasDropdown === 99 ? 'uts' : activeTugasDropdown === 100 ? 'uas' : `tugas-${activeTugasDropdown}`; setSchedule({...schedule, assignments: {...schedule.assignments, [key]: { date: taskDate }}})}} className="flex-1 py-3 bg-indigo-600 text-white rounded-xl text-[10px] font-black uppercase">Simpan</button>
                                                        <button onClick={() => { const type = activeTugasDropdown === 99 ? 'uts' : activeTugasDropdown === 100 ? 'uas' : 'tugas'; const initial = {}; students.forEach(s => { initial[s.nim] = assignmentData.some(a => a.nim === s.nim && a.id === activeTugasDropdown && a.type === type) ? 'Selesai' : ''; }); setManualAssignments(initial); setIsTaskInputModalOpen(true); }} className="flex-1 py-3 bg-violet-600 text-white rounded-xl text-[10px] font-black uppercase">Input Tugas</button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className={`p-8 rounded-[2.5rem] bg-gradient-to-br from-slate-900 to-blue-950 text-white shadow-2xl h-fit border border-white/10 relative overflow-hidden`}>
                                        <h3 className="font-black text-xl mb-6 uppercase tracking-tighter flex items-center gap-2"><Icons.GraduationCap /> Status PJ</h3>
                                        <div className="space-y-4">
                                            <QuickActionIcon icon={<Icons.UserCheck />} label="Mode" value={lectureMode.toUpperCase()} />
                                            <QuickActionIcon icon={<Icons.Clock />} label="Terakhir" value={new Date().toLocaleTimeString()} />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TABEL REKAPITULASI */}
                        {(activeTab === 'absensi' || activeTab === 'tugas') && (
                            <div className="space-y-4 animate-in slide-in-from-bottom">
                                <div className={`flex flex-col lg:flex-row lg:items-center justify-between gap-4 p-6 rounded-[2rem] border ${isDarkMode ? 'bg-slate-900/60 border-white/10' : 'bg-white/70 border-slate-200 shadow-xl'}`}>
                                    <div className="flex items-center gap-4">
                                        <h2 className="font-black text-2xl uppercase tracking-tighter">{activeTab === 'absensi' ? 'Rekap Absensi' : 'Rekap Tugas'}</h2>
                                        <button onClick={handleExport} className="px-5 py-2.5 rounded-2xl text-xs font-black bg-emerald-600 text-white hover:bg-emerald-700 shadow-lg"><Icons.Download /> EXPORT XLSX</button>
                                    </div>
                                    <div className="relative">
                                        <input type="text" placeholder="Cari..." className={`pl-6 pr-6 py-3 rounded-2xl text-sm w-full lg:w-80 outline-none font-bold ${isDarkMode ? 'bg-white/5 border-white/10 text-white' : 'bg-slate-50 border-slate-200'}`} value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                    </div>
                                </div>

                                <div className={`rounded-[2rem] border overflow-hidden shadow-2xl ${isDarkMode ? 'bg-slate-900/60 border-white/10' : 'bg-white/70 border-slate-200'}`}>
                                    <div className="overflow-x-auto custom-scrollbar">
                                        <table className="w-full text-sm text-left border-collapse">
                                            <thead className={`text-[10px] font-black uppercase tracking-widest border-b ${isDarkMode ? 'bg-white/5 text-slate-400' : 'bg-slate-50 text-slate-500'}`}>
                                                <tr>
                                                    <th className="px-4 py-8 sticky left-0 z-30 backdrop-blur-xl border-r border-slate-200/50">Geser</th>
                                                    <th className="px-8 py-8 sticky left-16 z-20 backdrop-blur-xl border-r border-slate-200/50 min-w-[220px]">Nama & NIM</th>
                                                    {activeTab === 'absensi' ? (
                                                        <>
                                                            {[...Array(14)].map((_, i) => {
                                                                const sched = schedule.attendance[`pertemuan-${i+1}`];
                                                                return (
                                                                    <th key={i} className="px-3 py-8 text-center min-w-[100px] border-l border-slate-100/50">
                                                                        <div className="font-black">P{i+1}</div>
                                                                        <div className="text-[7px] font-bold opacity-60">{sched?.date ? sched.date.split('-').reverse().join('/') : 'TBA'}</div>
                                                                        <div className={`text-[7px] font-black px-1.5 rounded-full ${sched?.mode === 'online' ? 'bg-blue-100 text-blue-600' : sched?.mode === 'offline' ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 opacity-50'}`}>{sched?.mode ? sched.mode.toUpperCase() : 'BELUM'}</div>
                                                                    </th>
                                                                );
                                                            })}
                                                            <th className="px-4 py-8 text-center min-w-[100px] bg-blue-500/10 text-blue-600 border-l border-blue-200/30 font-black">UTS</th>
                                                            <th className="px-4 py-8 text-center min-w-[100px] bg-blue-500/10 text-blue-600 border-l border-blue-200/30 font-black">UAS</th>
                                                        </>
                                                    ) : (
                                                        <>
                                                            {[...Array(6)].map((_, i) => {
                                                                const sched = schedule.assignments[`tugas-${i+1}`];
                                                                return (
                                                                    <th key={i} className="px-4 py-8 text-center min-w-[110px] border-l border-slate-100/50">
                                                                        <div className="font-black">T{i+1}</div>
                                                                        <div className="text-[7px] font-bold opacity-60 uppercase">{sched?.date ? sched.date : 'TBA'}</div>
                                                                    </th>
                                                                );
                                                            })}
                                                            <th className="px-4 py-8 text-center min-w-[110px] bg-indigo-500/10 text-indigo-600 border-l font-black">PROYEK UTS</th>
                                                            <th className="px-4 py-8 text-center min-w-[110px] bg-indigo-500/10 text-indigo-600 border-l font-black">PROYEK UAS</th>
                                                        </>
                                                    )}
                                                    <th className="px-8 py-8 text-center border-l bg-slate-50/50">Tindakan</th>
                                                </tr>
                                            </thead>
                                            <tbody className={`divide-y ${isDarkMode ? 'divide-white/5' : 'divide-slate-100'}`}>
                                                {filteredStudents.map((student, idx) => {
                                                    const originalIndex = students.findIndex(s => s.nim === student.nim);
                                                    return (
                                                        <tr 
                                                            key={student.nim} 
                                                            draggable
                                                            onDragStart={() => handleDragStart(originalIndex)}
                                                            onDragOver={handleDragOver}
                                                            onDrop={() => handleDrop(originalIndex)}
                                                            className={`group ${isDarkMode ? 'hover:bg-white/5' : 'hover:bg-white/50'} cursor-move`}
                                                        >
                                                            <td className={`px-4 py-5 sticky left-0 z-30 text-center backdrop-blur-xl border-r border-slate-200/50 ${isDarkMode ? 'bg-slate-900/90' : 'bg-slate-50/95'}`}>
                                                                <div className="flex flex-col items-center text-slate-300 group-hover:text-blue-500"><Icons.GripVertical /><span className="text-[9px] font-black">{idx + 1}</span></div>
                                                            </td>
                                                            <td className={`px-8 py-5 sticky left-16 z-20 backdrop-blur-xl border-r border-slate-200/50 ${isDarkMode ? 'bg-slate-900/90 text-white' : 'bg-white/95 text-slate-800 shadow-[2px_0_10px_rgba(0,0,0,0.02)]'}`}>
                                                                <div className="truncate max-w-[200px] text-xs font-black uppercase">{student.nama}</div>
                                                                <div className="text-[9px] font-mono opacity-30 font-black uppercase tracking-widest">{student.nim}</div>
                                                            </td>
                                                            {activeTab === 'absensi' ? (
                                                                <>
                                                                    {[...Array(14)].map((_, i) => {
                                                                        const rec = attendanceData.find(a => a.nim === student.nim && a.id === i+1 && a.type === 'pertemuan');
                                                                        return (
                                                                            <td key={i} className="px-3 py-5 border-l border-slate-100/30">
                                                                                <div className="flex justify-center">
                                                                                    <select 
                                                                                        className={`text-[9px] font-black p-2 rounded-xl border-none text-center cursor-pointer appearance-none ${!rec?.status ? 'bg-slate-100 text-slate-400 opacity-20' : rec.status === 'Hadir' ? 'bg-emerald-500 text-white' : rec.status === 'Izin' ? 'bg-amber-500 text-white' : 'bg-rose-500 text-white'}`}
                                                                                        value={rec?.status || ""}
                                                                                        onChange={(e) => updateAttendance(student.nim, i+1, 'pertemuan', e.target.value)}
                                                                                    >
                                                                                        <option value="">−</option>
                                                                                        <option value="Hadir">H</option><option value="Izin">I</option><option value="Alpa">A</option>
                                                                                    </select>
                                                                                </div>
                                                                            </td>
                                                                        );
                                                                    })}
                                                                    <td className="px-3 py-5 bg-blue-500/5 border-l border-slate-100/30"><select className="text-[9px] font-black p-2 rounded-xl bg-white w-full text-center border-none" value={attendanceData.find(a => a.nim === student.nim && a.type === 'uts')?.status || ""} onChange={(e) => updateAttendance(student.nim, 99, 'uts', e.target.value)}><option value="">−</option><option value="Hadir">H</option><option value="Izin">I</option><option value="Alpa">A</option></select></td>
                                                                    <td className="px-3 py-5 bg-blue-500/5 border-l border-slate-100/30"><select className="text-[9px] font-black p-2 rounded-xl bg-white w-full text-center border-none" value={attendanceData.find(a => a.nim === student.nim && a.type === 'uas')?.status || ""} onChange={(e) => updateAttendance(student.nim, 100, 'uas', e.target.value)}><option value="">−</option><option value="Hadir">H</option><option value="Izin">I</option><option value="Alpa">A</option></select></td>
                                                                </>
                                                            ) : (
                                                                <>
                                                                    {[...Array(6)].map((_, i) => {
                                                                        const rec = assignmentData.find(a => a.nim === student.nim && a.id === i+1 && a.type === 'tugas');
                                                                        return (
                                                                            <td key={i} className="px-3 py-5 border-l border-slate-100/30 text-center">
                                                                                <select className={`text-[8px] font-black p-2 rounded-xl border-none text-center appearance-none ${rec ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400 opacity-20'}`} value={rec ? "Selesai" : ""} onChange={(e) => updateAssignment(student.nim, i+1, 'tugas', e.target.value)}><option value="">−</option><option value="Selesai">SELESAI</option></select>
                                                                            </td>
                                                                        );
                                                                    })}
                                                                    <td className="px-3 py-5 bg-indigo-500/5 border-l border-slate-100/30 text-center"><select className={`text-[8px] font-black p-2 rounded-xl border-none text-center appearance-none ${assignmentData.some(a => a.nim === student.nim && a.type === 'uts') ? 'bg-indigo-800 text-white' : 'bg-white opacity-20'}`} value={assignmentData.some(a => a.nim === student.nim && a.type === 'uts') ? "Selesai" : ""} onChange={(e) => updateAssignment(student.nim, 99, 'uts', e.target.value)}><option value="">−</option><option value="Selesai">SELESAI</option></select></td>
                                                                    <td className="px-3 py-5 bg-indigo-500/5 border-l border-slate-100/30 text-center"><select className={`text-[8px] font-black p-2 rounded-xl border-none text-center appearance-none ${assignmentData.some(a => a.nim === student.nim && a.type === 'uas') ? 'bg-indigo-800 text-white' : 'bg-white opacity-20'}`} value={assignmentData.some(a => a.nim === student.nim && a.type === 'uas') ? "Selesai" : ""} onChange={(e) => updateAssignment(student.nim, 100, 'uas', e.target.value)}><option value="">−</option><option value="Selesai">SELESAI</option></select></td>
                                                                </>
                                                            )}
                                                            <td className="px-8 py-5 text-center border-l bg-slate-50/20">
                                                                <div className="flex gap-2 justify-center">
                                                                    <button onClick={() => openEditModal(student)} className="p-2.5 rounded-xl transition-all bg-white border hover:bg-blue-600 hover:text-white text-slate-400 shadow-sm"><Icons.Edit2 /></button>
                                                                    <button onClick={() => handleDeleteStudent(student.nim)} className="p-2.5 rounded-xl transition-all bg-white border border-rose-50 hover:bg-rose-500 hover:text-white text-rose-400 shadow-sm"><Icons.Trash2 /></button>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MODALS */}
                    {isAddModalOpen && <Modal isDark={isDarkMode} title="Daftar Mahasiswa Baru" onClose={() => setIsAddModalOpen(false)} icon={<Icons.UserPlus />}>
                        <div className="space-y-4 p-8">
                            <input type="text" placeholder="Nama" className={`w-full px-6 py-4 rounded-2xl border font-bold ${isDarkMode ? 'bg-slate-800 border-slate-700 text-white placeholder-slate-500' : 'bg-slate-50 border-slate-200'}`} value={newStudent.nama} onChange={e => setNewStudent({...newStudent, nama: e.target.value})} />
                            <input type="text" placeholder="NIM" className={`w-full px-6 py-4 rounded-2xl border font-bold ${isDarkMode ? 'bg-slate-800 border-slate-700 text-white placeholder-slate-500' : 'bg-slate-50 border-slate-200'}`} value={newStudent.nim} onChange={e => setNewStudent({...newStudent, nim: e.target.value})} />
                            <button onClick={handleAddStudent} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase shadow-xl">Daftarkan Mahasiswa</button>
                        </div>
                    </Modal>}

                    {isEditModalOpen && <Modal isDark={isDarkMode} title="Edit Profil" onClose={() => setIsEditModalOpen(false)} icon={<Icons.Edit2 />}>
                        <div className="space-y-4 p-8">
                            <input type="text" className={`w-full px-6 py-4 rounded-2xl border font-bold ${isDarkMode ? 'bg-slate-800 border-slate-700 text-white' : 'bg-white border-slate-200'}`} value={editingData.nama} onChange={e => setEditingData({...editingData, nama: e.target.value})} />
                            <input type="text" className={`w-full px-6 py-4 rounded-2xl border font-bold ${isDarkMode ? 'bg-slate-800 border-slate-700 text-white' : 'bg-white border-slate-200'}`} value={editingData.nim} onChange={e => setEditingData({...editingData, nim: e.target.value})} />
                            <button onClick={handleSaveEdit} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase shadow-xl">Simpan Perubahan</button>
                        </div>
                    </Modal>}

                    {isInputModalOpen && <Modal isDark={isDarkMode} title={`Rekap P${activePertemuan}`} onClose={() => setIsInputModalOpen(false)} icon={<Icons.UserCheck />}>
                        <div className="p-8 space-y-6">
                            {lectureMode === 'online' ? (
                                <div className="text-center space-y-4">
                                    <div className={`p-5 rounded-3xl font-mono text-xs break-all ${isDarkMode ? 'bg-blue-900/40 text-blue-400' : 'bg-blue-50 text-blue-600'}`}>{SESSION_LINKS[activePertemuan]}</div>
                                    <div className="flex flex-col gap-3 text-left">
                                        <a href={SESSION_LINKS[activePertemuan]} target="_blank" className="py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs text-center shadow-lg">1. Buka & Bagikan Form</a>
                                        <div className={`text-[10px] font-bold px-2 mt-2 text-center opacity-60 ${isDarkMode ? 'text-white' : 'text-slate-800'}`}>2. Download respons Form sebagai .CSV, lalu upload di bawah:</div>
                                        
                                        {uploadStatus && (
                                            <div className={`p-4 rounded-xl text-xs font-black text-center border ${uploadStatus.type === 'error' ? 'bg-rose-100 text-rose-600 border-rose-200' : uploadStatus.type === 'success' ? 'bg-emerald-100 text-emerald-600 border-emerald-200' : 'bg-blue-100 text-blue-600 border-blue-200 animate-pulse'}`}>
                                                {uploadStatus.text}
                                            </div>
                                        )}

                                        <label className={`py-4 border-2 border-emerald-500 text-emerald-500 rounded-2xl font-black uppercase text-xs cursor-pointer hover:bg-emerald-500 hover:text-white transition-all text-center ${isDarkMode ? 'hover:bg-emerald-600 hover:border-emerald-600' : ''}`}>
                                            Upload Excel/CSV & Sinkron NIM
                                            <input type="file" className="hidden" accept=".xlsx, .xls, .csv" onChange={handleFileUpload} />
                                        </label>
                                    </div>
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    <button onClick={() => { let m={}; students.forEach(s=>m[s.nim]='Hadir'); setManualAttendance(m); }} className="w-full py-2 bg-emerald-600 text-white rounded-xl text-[10px] font-black uppercase">Set Semua Hadir</button>
                                    <div className="max-h-64 overflow-y-auto custom-scrollbar space-y-2 pr-2">
                                        {students.map(s => (
                                            <div key={s.nim} className={`flex justify-between items-center p-3 border rounded-xl shadow-sm ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'}`}>
                                                <span className="text-[10px] font-black uppercase truncate max-w-[140px]">{s.nama}</span>
                                                <div className="flex gap-1">{['Hadir', 'Izin', 'Alpa'].map(st => (
                                                    <button key={st} onClick={() => setManualAttendance({...manualAttendance, [s.nim]: st})} className={`w-8 h-8 rounded-lg text-[9px] font-black border ${manualAttendance[s.nim] === st ? 'bg-blue-600 text-white border-blue-600' : isDarkMode ? 'bg-slate-700 border-slate-600 text-slate-300' : 'bg-slate-50 border-slate-200'}`}>{st[0]}</button>
                                                ))}</div>
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={saveManualAttendance} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs">Simpan Data</button>
                                </div>
                            )}
                        </div>
                    </Modal>}

                    {isTaskInputModalOpen && <Modal isDark={isDarkMode} title="Input Tugas Masal" onClose={() => setIsTaskInputModalOpen(false)} icon={<Icons.ClipboardCheck />}>
                        <div className="p-8 space-y-4">
                            <button onClick={() => { const all = {}; students.forEach(s => all[s.nim] = 'Selesai'); setManualAssignments(all); }} className="w-full py-3 bg-indigo-600 text-white rounded-xl text-[10px] font-black uppercase">Tandai Semua Selesai</button>
                            <div className="max-h-64 overflow-y-auto custom-scrollbar space-y-2 pr-2">
                                {students.map(s => (
                                    <div key={s.nim} className={`flex justify-between items-center p-3 border rounded-xl shadow-sm ${isDarkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'}`}>
                                        <span className="text-[10px] font-black uppercase truncate max-w-[140px]">{s.nama}</span>
                                        <button onClick={() => setManualAssignments({...manualAssignments, [s.nim]: manualAssignments[s.nim] === 'Selesai' ? '' : 'Selesai'})} className={`px-4 py-2 rounded-xl text-[9px] font-black border ${manualAssignments[s.nim] === 'Selesai' ? 'bg-indigo-600 text-white border-indigo-600' : isDarkMode ? 'bg-slate-700 border-slate-600 text-slate-300' : 'bg-slate-50 border-slate-200'}`}>{manualAssignments[s.nim] === 'Selesai' ? 'SELESAI' : 'BELUM'}</button>
                                    </div>
                                ))}
                            </div>
                            <button onClick={saveManualAssignments} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black uppercase text-xs">Simpan Data Tugas</button>
                        </div>
                    </Modal>}

                    <footer className="py-12 text-center border-t text-[10px] uppercase font-black opacity-40">Keuangan Bisnis Dashboard v6.0 • Cloud Integration © 2026</footer>
                    </div>
                </div>
            );
        };

        const StatCard = ({ title, value, icon, isDark }) => (
            <div className={`p-6 rounded-[2rem] border shadow-lg transition-all ${isDark ? 'bg-slate-900/60 border-white/10 text-white' : 'bg-white/70 border-white/40 text-slate-800'}`}>
                <div className="flex justify-between items-start">
                    <div><p className="text-[10px] font-black uppercase opacity-40 mb-1">{title}</p><h4 className="text-xl font-black">{value}</h4></div>
                    <div className="p-3 bg-blue-500/20 text-blue-500 rounded-2xl">{icon}</div>
                </div>
            </div>
        );

        const QuickActionIcon = ({ icon, label, value }) => (
            <div className="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/5">
                <div className="w-10 h-10 rounded-xl bg-blue-500/20 flex items-center justify-center text-blue-400">{icon}</div>
                <div><p className="text-[10px] font-bold opacity-40 uppercase">{label}</p><p className="text-xs font-black uppercase">{value}</p></div>
            </div>
        );

        const Modal = ({ title, icon, children, onClose, isDark }) => (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md">
                <div className={`w-full max-w-md ${isDark ? 'bg-slate-900 border-slate-700 text-white' : 'bg-white border-white'} rounded-[2.5rem] overflow-hidden shadow-2xl border flex flex-col max-h-[90vh]`}>
                    <div className={`p-8 border-b ${isDark ? 'border-slate-800' : 'border-slate-100'} flex items-center justify-between shrink-0`}>
                        <div className="flex items-center gap-3 text-blue-600">{icon}<h3 className="font-black text-xl uppercase tracking-tighter">{title}</h3></div>
                        <button onClick={onClose} className="p-2 rounded-full hover:bg-rose-500 hover:text-white transition-all"><Icons.X /></button>
                    </div>
                    {children}
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
